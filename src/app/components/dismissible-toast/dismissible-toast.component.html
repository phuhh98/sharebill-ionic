<ion-toast
  [isOpen]="showToast()"
  [message]="message()"
  duration="2000"
  [position]="position() === 'top' ? ToastPositionEnum.TOP : ToastPositionEnum.BOTTOM"
  [positionAnchor]="position() === 'top' ? ToastAnchorEnum.HEADER_TITLE : ToastAnchorEnum.TAB_BAR"
  (didDismiss)="onDismiss()"
  swipeGesture="vertical"
  color="medium"
  icon="warning"
/>
